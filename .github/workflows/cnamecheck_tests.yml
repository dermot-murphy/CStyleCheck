name: CStyleCheck Tests

on:
  push:
    paths:
      - "src/cnamecheck.py"
      - "src/naming_convention.yaml"
      - "src/_version.py"
      - "src/c_keywords.txt"
      - "src/c_stdlib_names.txt"
      - "src/c_spell_dict.txt"
      - "tests/**"
      - "tests/naming_convention.yaml"
      - "requirements.txt"
      - ".github/workflows/cnamecheck_tests.yml"
  pull_request:
    paths:
      - "src/cnamecheck.py"
      - "src/naming_convention.yaml"
      - "src/_version.py"
      - "src/c_keywords.txt"
      - "src/c_stdlib_names.txt"
      - "src/c_spell_dict.txt"
      - "tests/**"
      - "tests/naming_convention.yaml"
      - "requirements.txt"
      - ".github/workflows/cnamecheck_tests.yml"
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate _version.py
        working-directory: src
        run: |
          VERSION=$(git describe --tags --dirty --always 2>/dev/null || echo "0.0.0.dev")
          echo "__version__ = \"${VERSION}\"" > _version.py
          echo "Version: ${VERSION}"

      - name: Run unit tests
        run: |
          pytest tests/ --ignore=tests/test_cli.py \
            -v --tb=short \
            --cov=src --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Run CLI integration tests
        run: pytest tests/test_cli.py -v --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
