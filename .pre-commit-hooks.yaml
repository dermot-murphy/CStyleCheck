# .pre-commit-hooks.yaml
# =============================================================================
# CNameCheck — Embedded C naming-convention linter
# =============================================================================
#
# Add to your project's .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/dermot-murphy/CNameCheck
#       rev: v1.0.0            # pin to a release tag
#       hooks:
#         - id: cnamecheck
#           args:
#             - --config
#             - naming_convention.yaml   # path to your config in the repo
#
# The hook automatically receives the list of staged .c and .h files as
# positional arguments, so no --include glob is needed.
#
# For cross-file sign-compatibility checking (which needs to see all files,
# not just staged ones), run the tool in your CI pipeline instead:
#
#   python src/cnamecheck.py --config naming_convention.yaml \
#       --include "source/**/*.c" --include "source/**/*.h"
#
# =============================================================================

- id: cnamecheck
  name: CNameCheck
  description: >-
    Embedded C naming-convention linter (Barr-C / MISRA-C complementary).
    Enforces variable, function, type, macro, and include-guard naming rules
    defined in a YAML configuration file.
  entry: cnamecheck
  language: python
  # Match both .c translation units and .h headers
  files: '\.(c|h)$'
  # pyyaml is the only runtime dependency
  additional_dependencies: ['pyyaml>=6.0,<7.0']
  # Staged files are passed as positional arguments; no --include needed.
  pass_filenames: true
  # The hook is not slow enough to warrant running only on changed files;
  # keep the default (run on all matching staged files each commit).
